name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install pytest
        run: python -m pip install --upgrade pip pytest

      - name: Python tests (profiler + redactor + privacy guarantee)
        run: python -m pytest

      - name: Node tests (SessionStart hook contract)
        run: node --test tests/check-session.test.js

  validate:
    name: claude plugin validate --strict
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # Install the Claude Code CLI with Bun (project convention: prefer Bun over
      # npm). `bun install -g` is a Node-compatible install, so the `claude` CLI
      # still runs under the runner's preinstalled Node — no runtime gamble.
      - uses: oven-sh/setup-bun@v2

      - name: Install Claude Code CLI
        run: bun install -g @anthropic-ai/claude-code

      # When both marketplace.json and plugin.json exist, `validate` checks the
      # MARKETPLACE. Validate it directly here...
      - name: Validate marketplace manifest (repo root)
        run: claude plugin validate . --strict

      # ...then validate the PLUGIN (plugin.json + skill/hook frontmatter) from a
      # manifest-only copy WITHOUT marketplace.json, so `validate` picks plugin mode.
      - name: Validate plugin manifest (no marketplace.json)
        run: |
          set -euo pipefail
          tmp="$(mktemp -d)"
          cp -r .claude-plugin "$tmp/"
          rm -f "$tmp/.claude-plugin/marketplace.json"
          cp -r skills hooks "$tmp/"
          claude plugin validate "$tmp" --strict
