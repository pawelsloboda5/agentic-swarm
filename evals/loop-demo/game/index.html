        applyImpact(p);
        p.alive = false;
        continue;
      }
      const step = p.speed * dt;
      if (step >= dist) {
        p.pos.x = target.pos.x; p.pos.y = target.pos.y + 0.4; p.pos.z = target.pos.z;
      } else {
        p.pos.x += (dx / dist) * step;
        p.pos.y += (dy / dist) * step;
        p.pos.z += (dz / dist) * step;
      }
    }
  }

  // ---- wave lifecycle --------------------------------------------------------
  function buildSpawnQueue(wave) {
    const cfg = GAME.config;
    const count = Math.max(1, Math.round(cfg.WAVE_BASE_COUNT * Math.pow(cfg.WAVE_GROWTH, wave - 1)));
    const hpMul = Math.pow(cfg.ENEMY_HP_GROWTH, wave - 1);
    const queue = [];
    for (let i = 0; i < count; i++) {
      let type = 'grunt';
      // Tanks every 5th from wave 3; runners interleaved from wave 2.
      if (wave >= 3 && i % 5 === 4) type = 'tank';
      else if (wave >= 2 && i % 3 === 1) type = 'runner';
      const base = ENEMY_TYPES[type];
      queue.push({
        type,
        hp: Math.round(base.hp * hpMul),
        speed: base.speed,
        bounty: base.bounty
      });
    }
    return queue;
  }

  function checkWaveClear() {
    const st = GAME.state;
    if (!st.waveActive) return;
    const anyAlive = st.enemies.some(e => e.alive);
    if (st.spawnQueue.length === 0 && !anyAlive) {
      st.waveActive = false;
      st.enemiesAlive = 0;
      st.score += WAVE_CLEAR_SCORE;
      emit('wave:clear', { wave: st.wave });
      emit('state:changed', {});
      if (st.wave >= GAME.config.MAX_WAVES) {
        setPhase('won');
        sfx('win');
      } else {
        setPhase('building');
      }
    }
  }

  function setPhase(phase) {
    const st = GAME.state;
    if (st.phase === phase) return;
    st.phase = phase;
    emit('phase:changed', { phase });
  }

  // ---- public API ------------------------------------------------------------
  const gameplay = {
    init() {
      const cfg = GAME.config;
      const st = GAME.state;
      // Seed HUD scalars from config defaults.
      st.lives = cfg.START_LIVES;
      st.gold = cfg.START_GOLD;
      st.score = 0;
      st.wave = 0;
      st.phase = 'menu';
      st.enemies = [];
      st.towers = [];
      st.projectiles = [];
      st.selectedTowerType = null;
      st.hoverTile = null;
      st.selectedTower = null;
      st.waveActive = false;
      st.spawnQueue = [];
      st.enemiesAlive = 0;
      // Precompute world path + the path-cell mask for build validation.
      _pathCellSet = buildPathCellSet();
      buildWorldPath();
      emit('state:changed', {});
    },

    update(dt) {
      const st = GAME.state;
      if (!dt || dt <= 0) return;
      if (dt > 0.1) dt = 0.1; // clamp big frame gaps (tab refocus)
      // Only simulate during active play.
      if (st.phase !== 'wave' && st.phase !== 'building') return;

      // 1) Release queued spawns over time.
      if (st.waveActive && st.spawnQueue.length > 0) {
        _spawnTimer -= dt;
        while (_spawnTimer <= 0 && st.spawnQueue.length > 0) {
          spawnEnemy(st.spawnQueue.shift());
          _spawnTimer += _spawnInterval;
        }
      }

      // 2) Advance enemies; detect leaks.
      let leaked = false;
      for (const e of st.enemies) {
        if (!e.alive) continue;
        if (advanceEnemy(e, dt) === 'leak') {
          e.alive = false;
          e.reachedBase = true;
          st.lives = Math.max(0, st.lives - 1);
          leaked = true;
          emit('enemy:leak', { enemy: e });
        }
      }
      if (leaked) { sfx('leak'); emit('state:changed', {}); }

      // 3) Towers acquire + fire.
      for (const tower of st.towers) {
        if (tower.cooldown > 0) tower.cooldown -= dt;
        const target = acquireTarget(tower);
        tower.target = target;
        if (target && tower.cooldown <= 0) fire(tower, target);
      }

      // 4) Projectiles travel + impact (may award gold/score via killEnemy).
      updateProjectiles(dt);

      // 5) Reap dead enemies/projectiles from the collections.
      if (st.enemies.length) st.enemies = st.enemies.filter(e => e.alive);
      if (st.projectiles.length) st.projectiles = st.projectiles.filter(p => p.alive);
      st.enemiesAlive = st.enemies.length;

      // 6) Win/lose + wave-clear bookkeeping.
      if (st.lives <= 0 && st.phase !== 'gameover') {
        setPhase('gameover');
        sfx('gameover');
        return;
      }
      checkWaveClear();
    },

    startWave() {
      const st = GAME.state;
      const cfg = GAME.config;
      if (st.waveActive) return;                 // already running
      if (st.phase === 'gameover' || st.phase === 'won') return;
      if (st.wave >= cfg.MAX_WAVES) return;
      st.wave += 1;
      st.spawnQueue = buildSpawnQueue(st.wave);
      st.waveActive = true;
      // Spawn pacing eases slightly as waves grow so big waves don't take forever.
      _spawnInterval = Math.max(0.45, 0.9 - st.wave * 0.02);
      _spawnTimer = 0;
      setPhase('wave');
      emit('wave:start', { wave: st.wave });
      sfx('waveStart');
      emit('state:changed', {});
    },

    canPlace(cell) {
      if (!cell) return false;
      const st = GAME.state;
      const cfg = GAME.config;
      const type = st.selectedTowerType;
      if (!type) return false;
      const arch = cfg.TOWERS[type];
      if (!arch) return false;
      if (!inBounds(cell.c, cell.r)) return false;
      if (isPathCell(cell.c, cell.r)) return false;
      if (towerAt(cell.c, cell.r)) return false;
      if (st.gold < arch.cost) return false;
      return true;
    },

    placeTower(cell) {
      const st = GAME.state;
      const cfg = GAME.config;
      if (!this.canPlace(cell)) return null;
      const type = st.selectedTowerType;
      const a = cfg.TOWERS[type];
      const world = cellToWorld(cell.c, cell.r);
      const a2 = art();
      const tower = {
        id: nextId(),
        type,
        level: 1,
        cell: { c: cell.c, r: cell.r },
        pos: { x: world.x, y: world.y, z: world.z },
        range: a.range,
        dps: a.dps,
        fireRate: a.fireRate,
        cooldown: 0,
        target: null,
        invested: a.cost,    // for sell refund accounting
        mesh: (a2 && a2.makeTowerMesh) ? a2.makeTowerMesh(type, 1) : null
      };
      st.gold -= a.cost;
      st.towers.push(tower);
      emit('tower:placed', { tower });
      emit('state:changed', {});
      return tower;
    },

    selectTower(tower) {
      GAME.state.selectedTower = tower || null;
    },

    upgradeTower(tower) {
      const st = GAME.state;
      const cfg = GAME.config;
      if (!tower) return false;
      const arche = cfg.TOWERS[tower.type];
      if (!arche) return false;
      const cost = Math.round((arche.upgradeCost || 40) * Math.pow(UPGRADE_COST_GROWTH, tower.level - 1));
      if (st.gold < cost) return false;
      st.gold -= cost;
      tower.invested += cost;
      tower.level += 1;
      tower.range *= UPGRADE_RANGE_MUL;
      tower.dps *= UPGRADE_DPS_MUL;
      // Swap to the upgraded mesh (engine.syncMeshes reconciles add/remove).
      const a = art();
      if (a && a.makeTowerMesh) {
        const nm = a.makeTowerMesh(tower.type, tower.level);
        if (nm) tower.mesh = nm;
      }
      emit('tower:upgraded', { tower });
      emit('state:changed', {});
      return true;
    },

    sellTower(tower) {
      const st = GAME.state;
      const cfg = GAME.config;
      if (!tower) return false;
      const idx = st.towers.indexOf(tower);
      if (idx === -1) return false;
      const refund = Math.round((cfg.SELL_REFUND || 0.6) * (tower.invested || 0));
      st.gold += refund;
      st.towers.splice(idx, 1);
      if (st.selectedTower === tower) st.selectedTower = null;
      // Orphan any in-flight projectiles aimed by this tower's targeting (none stored), fine.
      emit('tower:sold', { tower, refund });
      emit('state:changed', {});
      return true;
    },

    reset() {
      // Full restart to a fresh, playable game.
      _id = 1;
      _spawnTimer = 0;
      _spawnInterval = 0.9;
      this.init();
      setPhase('building');
    }
  };

  GAME.gameplay = gameplay;

    on(dom['btn-pause'], 'click', togglePause);

    // mute
    on(dom['btn-mute'], 'click', toggleMute);

    // tower panel
    on(dom['btn-upgrade'], 'click', () => {
      const t = st().selectedTower;
      if (t && GAME.gameplay && GAME.gameplay.upgradeTower) GAME.gameplay.upgradeTower(t);
    });
    on(dom['btn-sell'], 'click', () => {
      const t = st().selectedTower;
      if (t && GAME.gameplay && GAME.gameplay.sellTower) GAME.gameplay.sellTower(t);
    });
    on(dom['btn-tp-close'], 'click', () => {
      if (GAME.gameplay && GAME.gameplay.selectTower) GAME.gameplay.selectTower(null);
      ui.openTowerPanel(null);
    });

    // overlay primary action (Play / Resume / Play Again)
    on(dom['overlay-action'], 'click', onOverlayAction);

    // canvas pointer input (ui owns DOM input; routes to engine picking + gameplay)
    const canvas = $('game-canvas');
    on(canvas, 'pointermove', onCanvasMove);
    on(canvas, 'pointerleave', () => { if (GAME.engine && GAME.engine.setHoverCell) GAME.engine.setHoverCell(null); });
    on(canvas, 'click', onCanvasClick);

    // global keyboard affordances
    on(window, 'keydown', onKeyDown);
  }

  function onCanvasMove(e) {
    const eng = GAME.engine; if (!eng || !eng.screenToCell) return;
    const cell = eng.screenToCell(e.clientX, e.clientY);
    if (eng.setHoverCell) eng.setHoverCell(cell);
  }

  function onCanvasClick(e) {
    const eng = GAME.engine, gp = GAME.gameplay;
    if (!eng || !eng.screenToCell || !gp) return;
    const cell = eng.screenToCell(e.clientX, e.clientY);
    if (!cell) return;
    // 1) a tower type is selected and the cell is buildable -> place it
    if (st().selectedTowerType && gp.canPlace && gp.canPlace(cell)) {
      const placed = gp.placeTower && gp.placeTower(cell);
      if (!placed) ui.showToast('Cannot build there', 'bad');
      return;
    }
    // 2) clicked an existing tower -> inspect (upgrade/sell)
    const existing = (st().towers || []).find(t =>
      t.cell && t.cell.c === cell.c && t.cell.r === cell.r);
    if (existing) {
      if (gp.selectTower) gp.selectTower(existing);
      ui.openTowerPanel(existing);
      return;
    }
    // 3) empty inspect click -> dismiss any open panel
    if (gp.selectTower) gp.selectTower(null);
    ui.openTowerPanel(null);
  }

  function onKeyDown(e) {
    if (e.defaultPrevented) return;
    const tag = (e.target && e.target.tagName) || '';
    if (tag === 'INPUT' || tag === 'TEXTAREA') return;
    switch (e.key) {
      case '1': ui.selectShop(st().selectedTowerType === 'arrow'  ? null : 'arrow');  break;
      case '2': ui.selectShop(st().selectedTowerType === 'cannon' ? null : 'cannon'); break;
      case '3': ui.selectShop(st().selectedTowerType === 'frost'  ? null : 'frost');  break;
      case 'Escape':
        if (st().phase === 'paused') { togglePause(); break; }
        if (st().selectedTowerType) { ui.selectShop(null); break; }
        if (GAME.gameplay && GAME.gameplay.selectTower) GAME.gameplay.selectTower(null);
        ui.openTowerPanel(null);
        break;
      case 'p': case 'P': togglePause(); break;
      case 'm': case 'M': toggleMute(); break;
      default: return;
    }
  }

  function toggleMute() {
    const a = GAME.art;
    let muted;
    if (a && a.toggleMute) muted = a.toggleMute();
    else { st().muted = !st().muted; muted = st().muted; }   // fallback
    reflectMute(!!muted);
  }
  function reflectMute(muted) {
    const b = dom['btn-mute']; if (!b) return;
    b.textContent = muted ? '🔇' : '🔊';  // 🔇 / 🔊
    b.setAttribute('aria-pressed', String(muted));
    b.setAttribute('aria-label', muted ? 'Sound off, turn on' : 'Sound on, turn off');
  }

  // Pause/resume. The contract defines a 'paused' phase but no gameplay.pause
  // intent, so we prefer one if present and otherwise toggle the phase here
  // (gameplay.update self-gates on phase, so the sim freezes either way).
  function togglePause() {
    const s = st();
    const gp = GAME.gameplay;
    if (gp && gp.togglePause) { gp.togglePause(); return; }
    if (s.phase === 'paused') {
      const back = (_prevPhase === 'wave' || _prevPhase === 'building') ? _prevPhase : 'building';
      setPhaseSafe(back);
    } else if (s.phase === 'wave' || s.phase === 'building') {
      _prevPhase = s.phase;
      setPhaseSafe('paused');
    }
  }
  function setPhaseSafe(phase) {
    const s = st();
    if (s.phase === phase) return;
    s.phase = phase;
    emit('phase:changed', { phase });
  }

  function onOverlayAction() {
    const phase = st().phase;
    const gp = GAME.gameplay;
    if (phase === 'paused') { togglePause(); return; }
    // menu / gameover / won -> (re)start a fresh game
    if (gp && gp.reset) gp.reset();
    else setPhaseSafe('building');
  }

  // ----- event subscriptions -------------------------------------------------
  function subscribe() {
    const ev = GAME.events;
    ev.on('state:changed', ui.update);
    ev.on('phase:changed', (p) => ui.showOverlay((p && p.phase) || st().phase));
    ev.on('wave:start', (p) => ui.showToast('Wave ' + (p && p.wave) + ' incoming', 'info'));
    ev.on('wave:clear', (p) => ui.showToast('Wave ' + (p && p.wave) + ' cleared  +50', 'good'));
    ev.on('enemy:leak', () => ui.showToast('A creep reached the base!', 'bad'));
    ev.on('tower:placed', () => ui.showToast('Tower built', 'good'));
    ev.on('tower:upgraded', (p) => { if (p && p.tower) ui.openTowerPanel(p.tower); ui.showToast('Tower upgraded', 'good'); });
    ev.on('tower:sold', () => { ui.openTowerPanel(null); ui.showToast('Tower sold', 'info'); });
  }

  // ===========================================================================
  // 4. PUBLIC API (§3.3)
  // ===========================================================================
  const ui = {
    init() {
      ensureStyle();
      ensureMarkup();
      cache();
      buildShopCards();
      wire();
      subscribe();
      // initial paints
      reflectMute(!!(st().muted || (GAME.art && GAME.art.isMuted && GAME.art.isMuted())));
      ui.openTowerPanel(null);
      ui.showOverlay(st().phase || 'menu');
      ui.update();
    },

    // Cheap per-frame sync: write scalars only when they change.
    update() {
      const s = st();
      setText('val-lives', s.lives);
      setText('val-gold', s.gold);
      setText('val-score', s.score);
      const waveStr = (s.wave || 0) + '/' + (cfg().MAX_WAVES || 20);
      setText('val-wave', waveStr);

      // stat accessible names + low-life cue
      setAria('stat-lives', 'Lives ' + s.lives);
      setAria('stat-gold', 'Gold ' + s.gold);
      setAria('stat-score', 'Score ' + s.score);
      setAria('stat-wave', 'Wave ' + (s.wave || 0) + ' of ' + (cfg().MAX_WAVES || 20));
      if (dom['stat-lives']) {
        const crit = (s.lives > 0 && s.lives <= 5);
        if (last.crit !== crit) { dom['stat-lives'].classList.toggle('is-critical', crit); last.crit = crit; }
      }

      // shop affordability + selection
      const gold = s.gold || 0;
      dom.shopCards.forEach(card => {
        const type = card.getAttribute('data-tower');
        const cost = Number(card.dataset.cost || 0);
        const broke = gold < cost;
        card.setAttribute('aria-disabled', String(broke));
        const costEl = card.querySelector('.shop-cost');
        if (costEl) costEl.classList.toggle('is-broke', broke);
        const sel = s.selectedTowerType === type;
        if (card.getAttribute('aria-pressed') !== String(sel))
          card.setAttribute('aria-pressed', String(sel));
      });

      // wave / pause button states
      const playing = (s.phase === 'wave' || s.phase === 'building');
      const sw = dom['btn-start-wave'];
      if (sw) {
        const canStart = !s.waveActive && s.phase !== 'gameover' && s.phase !== 'won'
          && (s.wave || 0) < (cfg().MAX_WAVES || 20) && s.phase !== 'paused';
        setDisabled(sw, !canStart);
        const lbl = s.waveActive ? 'Wave ' + s.wave + ' active' : 'Start Wave ' + ((s.wave || 0) + 1);
        if (sw.textContent !== lbl) sw.textContent = lbl;
      }
      const pb = dom['btn-pause'];
      if (pb) {
        const lbl = (s.phase === 'paused') ? 'Resume' : 'Pause';
        if (pb.textContent !== lbl) pb.textContent = lbl;
        pb.setAttribute('aria-pressed', String(s.phase === 'paused'));
        setDisabled(pb, !(playing || s.phase === 'paused'));
      }

      // live tower panel figures (cost/refund move with gold/level)
      if (s.selectedTower && dom['hud-tower-panel'] &&
          !dom['hud-tower-panel'].classList.contains('hidden')) {
        renderTowerPanel(s.selectedTower);
      }
    },

    showToast(msg, kind) {
      const el = dom['hud-toast']; if (!el) return;
      el.textContent = msg;
      el.className = 'kind-' + (kind || 'info') + ' show';
      el.classList.remove('hidden');
      if (_toastTimer) clearTimeout(_toastTimer);
      _toastTimer = setTimeout(() => {
        el.classList.remove('show');
        _toastTimer = setTimeout(() => el.classList.add('hidden'), 220);
      }, 1900);
    },

    showOverlay(kind) {
      const ov = dom['overlay']; if (!ov) return;
      const PLAY = { wave: 1, building: 1 };
      if (PLAY[kind]) {                 // hide during active play
        if (!ov.classList.contains('hidden')) {
          ov.classList.add('hidden');
          if (_lastFocus && _lastFocus.focus) { try { _lastFocus.focus(); } catch (_) {} _lastFocus = null; }
        }
        return;
      }
      const COPY = {
        menu:     ['Tower Defense', 'Defend the base. Buy towers, survive 20 escalating waves.', 'Play'],
        paused:   ['Paused', 'Take a breath. The swarm is holding.', 'Resume'],
        gameover: ['Defenses Breached', 'The base fell. Regroup and try again.', 'Play Again'],
        won:      ['Victory', 'All 20 waves repelled. The base stands.', 'Play Again']
      };
      const c = COPY[kind] || COPY.menu;
      setText('overlay-title', c[0]);
      setText('overlay-msg', c[1]);
      if (dom['overlay-action']) dom['overlay-action'].textContent = c[2];
      _lastFocus = document.activeElement;
      ov.classList.remove('hidden');
      // focus the primary action for keyboard users entering the modal
      if (dom['overlay-action']) { try { dom['overlay-action'].focus(); } catch (_) {} }
    },

    selectShop(type) {
      const s = st();
      s.selectedTowerType = type || null;
      // clearing a build selection also clears the build ghost
      if (!type && GAME.engine && GAME.engine.setHoverCell) {
        if (s.hoverTile) GAME.engine.setHoverCell(s.hoverTile);
      }
      dom.shopCards.forEach(card => {
        const sel = card.getAttribute('data-tower') === type;
        card.setAttribute('aria-pressed', String(sel));
      });
      // selecting a build type implies leaving inspect mode
      if (type) ui.openTowerPanel(null);
      emit('state:changed', {});
    },

    openTowerPanel(tower) {
      const p = dom['hud-tower-panel']; if (!p) return;
      if (!tower) { p.classList.add('hidden'); return; }
      renderTowerPanel(tower);
      p.classList.remove('hidden');
      // move focus to the panel's first action for keyboard reachability
      if (dom['btn-upgrade']) { try { dom['btn-upgrade'].focus(); } catch (_) {} }
    },

    // exported drop-in fragments
    CSS, HTML
  };

  // ----- small DOM helpers (dirty-checked) -----------------------------------
  function setText(id, v) {
    const el = dom[id]; if (!el) return;
    const str = String(v);
    if (last[id] !== str) { el.textContent = str; last[id] = str; }
  }
  function setAria(id, v) {
    const el = dom[id]; if (!el) return;
    const k = 'aria:' + id;
    if (last[k] !== v) { el.setAttribute('aria-label', v); last[k] = v; }
  }
  function setDisabled(el, disabled) {
    if (!el) return;
    if (disabled) { el.setAttribute('disabled', ''); el.setAttribute('aria-disabled', 'true'); }
    else { el.removeAttribute('disabled'); el.removeAttribute('aria-disabled'); }
  }

  function upgradeCostOf(t) {
    const arche = (cfg().TOWERS || {})[t.type] || {};
    const base = arche.upgradeCost || 40;
    return Math.round(base * Math.pow(1.5, (t.level || 1) - 1)); // matches gameplay growth
  }
  function renderTowerPanel(t) {
    const cost = upgradeCostOf(t);
    const refund = Math.round((cfg().SELL_REFUND || 0.6) * (t.invested || 0));
    const name = ((cfg().TOWERS || {})[t.type] || {}).name || t.type;
    if (dom['tp-title']) {
      dom['tp-title'].innerHTML =
        esc(name) + ' &middot; Lv ' + (t.level || 1) +
        '<span class="tp-sub">DPS ' + Math.round(t.dps) + ' &middot; Range ' + (Math.round(t.range * 10) / 10) + '</span>';
    }
    const gold = st().gold || 0;
    const up = dom['btn-upgrade'];
    if (up) {
      up.textContent = 'Upgrade (' + cost + ')';
      up.setAttribute('aria-label', 'Upgrade ' + name + ' to level ' + ((t.level || 1) + 1) + ' for ' + cost + ' gold');
      setDisabled(up, gold < cost);
    }
    const sell = dom['btn-sell'];
    if (sell) {
      sell.textContent = 'Sell (+' + refund + ')';
      sell.setAttribute('aria-label', 'Sell ' + name + ' for ' + refund + ' gold');
    }
  }

  GAME.ui = ui;
})();

/* ===== integrator: boot + FX bridge ===== */

/* ---- integrator boot: wires modules, bridges FX, starts the loop ------------ */
function _showBootError(err){
  try{
    const root = document.getElementById('game-root') || document.body;
    let box = document.getElementById('engine-fatal');
    if(!box){
      box = document.createElement('div');
      box.id = 'engine-fatal';
      box.setAttribute('role','alert');
      box.style.cssText = 'position:fixed;inset:0;z-index:9999;display:flex;flex-direction:column;'+
        'align-items:center;justify-content:center;gap:.75rem;padding:2rem;text-align:center;'+
        'font-family:system-ui,Segoe UI,Roboto,sans-serif;background:var(--bg-deep,#0c0f16);color:var(--text,#f5f7fa)';
      const h=document.createElement('h1'); h.textContent='The game failed to start';
      h.style.cssText='margin:0;font-size:1.5rem;color:var(--text,#f5f7fa)';
      const p=document.createElement('p'); p.id='engine-fatal-msg';
      p.style.cssText='margin:0;max-width:42ch;line-height:1.5;color:var(--muted,#c5d0e6)';
      box.appendChild(h); box.appendChild(p); root.appendChild(box);
    }
    const m=document.getElementById('engine-fatal-msg');
    if(m) m.textContent = (err && err.message) ? err.message : String(err);
  }catch(_){ /* nothing more we can do */ }
}

function _wireFX(){
  const ev = GAME.events, art = GAME.art, eng = GAME.engine;
  if(!ev) return;
  // enemy:killed -> particle pop ; enemy:leak -> red puff + camera shake.
  ev.on('enemy:killed', p => { const e = p && p.enemy; if(e && e.pos && art && art.hitFX){ try{ art.hitFX(e.pos,'kill'); }catch(_){} } });
  ev.on('enemy:leak',   p => { const e = p && p.enemy; if(e && e.pos && art && art.hitFX){ try{ art.hitFX(e.pos,'leak'); }catch(_){} } if(eng && eng.shake){ try{ eng.shake(0.7); }catch(_){} } });
  // economy cues that gameplay does not play itself.
  ev.on('tower:placed',   () => { if(art && art.sfx){ try{ art.sfx('place'); }catch(_){} } });
  ev.on('tower:upgraded', () => { if(art && art.sfx){ try{ art.sfx('upgrade'); }catch(_){} } });
  ev.on('tower:sold',     () => { if(art && art.sfx){ try{ art.sfx('sell'); }catch(_){} } });
}

GAME.boot = async function boot(){
  try{
    if(GAME.art && GAME.art.init) GAME.art.init();
    const ok = GAME.engine.init('#game-canvas');
    if(ok === false) return;            // engine already rendered a visible fatal message
    GAME.gameplay.init();
    GAME.ui.init();

    // FX bridge: let art own its particle/muzzle FX lifecycle on the engine scene,
    // and drive art.update(dt) once per frame via a persistent ticker in the fx group.
    try{
      const scene = GAME.engine._internal && GAME.engine._internal.scene;
      if(scene && GAME.art && GAME.art.attachScene){
        GAME.art.attachScene(scene);
        const ticker = new THREE.Object3D();
        ticker.name = 'art-fx-ticker';
        ticker.userData.tick = (dt) => { try{ GAME.art.update(dt); }catch(_){} return true; };
        if(GAME.engine.addMesh) GAME.engine.addMesh(ticker);
      }
    }catch(_){ /* FX bridge is optional; game still plays without it */ }

    _wireFX();
    GAME.engine.start();
  }catch(err){
    console.error('[GAME.boot] failed:', err);
    _showBootError(err);
  }
};

if(document.readyState === 'loading'){
  window.addEventListener('DOMContentLoaded', () => GAME.boot());
}else{
  GAME.boot();
}

</script>
