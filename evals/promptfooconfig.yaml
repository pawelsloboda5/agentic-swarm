# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json
#
# Does the agentic-swarm skill make models write SAFER parallel-subagent orchestration?
# Each task runs under two prompt variants (baseline vs with-skill) against every model; the gap
# between the two scores is the skill's measured uplift.
#
# Rigor (v2 — see evals/README.md "Methodology"):
#  - max_completion_tokens is pinned high so scripts are never truncated mid-write (the v1 flaw
#    that made the GPT-4.1 numbers untrustworthy).
#  - Determinism: temperature 0 + a fixed seed for the non-reasoning models (gpt-4.1 / -mini), so
#    they are reproducible. GPT-5.x are reasoning models and OpenAI REJECTS `temperature` on them,
#    so we set a seed (best-effort) and average over repeats (run with `--repeat N`).
#  - Independent, CROSS-FAMILY judge: Claude scores OpenAI outputs. With no Claude contestant there
#    is no self-preference bias (the main flaw of judging GPT outputs with a GPT judge).

description: "agentic-swarm safe-swarm skill uplift (baseline vs with-skill), cross-family Claude judge"

prompts:
  - file://prompts/baseline.js
  - file://prompts/with-skill.js

providers:
  - id: openai:chat:gpt-5.5 # frontier (reasoning model: temperature unsupported)
    config: { max_completion_tokens: 16000, seed: 1234 }
  - id: openai:chat:gpt-5.4-mini # mid tier (reasoning model: temperature unsupported)
    config: { max_completion_tokens: 16000, seed: 1234 }
  - id: openai:chat:gpt-4.1 # non-reasoning floor (fully deterministic)
    config: { temperature: 0, seed: 1234, max_tokens: 8000 }
  - id: openai:chat:gpt-4.1-mini # non-reasoning cheap floor (fully deterministic)
    config: { temperature: 0, seed: 1234, max_tokens: 8000 }

defaultTest:
  options:
    # Independent cross-family judge — removes the self-preference an OpenAI judge would have on
    # OpenAI contestants. temperature 0 keeps the judging itself near-deterministic.
    provider:
      id: anthropic:messages:claude-sonnet-4-6
      config: { temperature: 0, max_tokens: 1500 }
  assert:
    - type: javascript
      value: file://asserts/safety-patterns.js
    - type: llm-rubric
      value: >-
        Grade how SAFE-BY-CONSTRUCTION this Claude Code Workflow orchestration script is for a large
        parallel-subagent fan-out: how well it avoids (a) one hung connection deadlocking the whole
        run with no notification, and (b) silently losing or truncating completed work. Judge ONLY
        the code shown. For each property note present / partial / absent: (1) bounded waves (~6-8)
        instead of one parallel()/pipeline() over all items; (2) per-agent() null-tolerance and
        retry of failures; (3) results committed per wave (no single hard barrier before synthesis);
        (4) an armed ScheduleWakeup stall watchdog (may appear as an accompanying call or comment,
        since it is agent-level); (5) resume / cache-stable finder prompts (no Date.now or
        Math.random); (6) lean, capped outputs / schemas; (7) synthesis that tolerates partial input
        and explicitly flags gaps; (8) backoff when a wave's failure rate is high. Then output JSON
        {pass, score, reason}, where score in [0,1] is calibrated as: 0.1-0.2 = one unbounded
        barrier with no watchdog and no retry; ~0.5 = bounded waves plus some retry but missing the
        watchdog and/or backoff; 0.8-1.0 = waves plus per-agent retry plus per-wave commit plus
        watchdog plus backoff plus gap-flagging. pass = score >= 0.6. Keep reason to 1-3 sentences.

tests: file://tasks/tasks.yaml
